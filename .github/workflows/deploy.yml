name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:
    inputs:
      run_cross_e2e:
        description: 'Run cross-browser E2E (Chromium + WebKit)'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high || true

      - name: Lint
        run: npm run lint

      - name: Unit and integration tests (Vitest)
        run: npm run test

      - name: Build (quality gate)
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (E2E server)
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E Tests
        run: npm run test:e2e

  e2e-cross-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (E2E server)
        run: npm run build

      - name: Install Playwright browsers (Chromium + WebKit)
        run: npx playwright install --with-deps chromium webkit

      - name: Cross-browser smoke E2E (PR gate)
        run: >
          npm run test:e2e:cross --
          tests/e2e/setup-to-game.spec.ts
          tests/e2e/league-multitable.spec.ts
          --project=chromium
          --project=webkit
          --workers=1
          --retries=0

  e2e-cross:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.run_cross_e2e)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (E2E server)
        run: npm run build

      - name: Install Playwright browsers (Chromium + WebKit)
        run: npx playwright install --with-deps chromium webkit

      - name: Cross-browser E2E Tests
        run: npm run test:e2e:cross

  pages-build:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [quality, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (deploy)
        run: npm run build
        env:
          VITE_BASE_PATH: /7MountainPoker/

      - name: Bundle size check
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -lh dist/assets/*.js | awk '{print $5, $9}' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          MAIN_BUNDLE=$(ls -S dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -n "$MAIN_BUNDLE" ]; then
            MAIN_SIZE=$(wc -c < "$MAIN_BUNDLE" | tr -d ' ')
            MAX_SIZE=520000
            if [ "$MAIN_SIZE" -gt "$MAX_SIZE" ]; then
              echo "::warning::Main bundle exceeds ${MAX_SIZE} bytes (actual: ${MAIN_SIZE} bytes)"
            fi
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: pages-build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
